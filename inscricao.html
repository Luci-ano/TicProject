<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="img/colorido.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>ITEL-INSCRIÇÃO</title>
</head>

<body>

    <section class="inscricao">

        <h1>Inscrição no ITEL</h1>
        <p>Preencha os dados para se candidatar ao Instituto de Telecomunicações</p>

        <form class="form-inscricao">

            <label for="nome">Nome completo</label>
            <input id="nome" type="text" placeholder="Digite o seu nome completo">

            <label for="email">Email</label>
            <input id="email" type="email" placeholder="exemplo@email.com">

            <label for="telefone">Telefone</label>
            <input id="telefone" type="tel" placeholder="+244 9XX XXX XXX">

            <label for="curso">Curso pretendido</label>
            <select id="curso">
                <option value="">Escolha um curso</option>
                <option>Informática</option>
                <option>Telecomunicações</option>
                <option>Electrónica</option>
            </select>

            <label for="data">Data de nascimento</label>
            <input id="data" type="date">

            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" placeholder="Escreva alguma informação adicional"></textarea>

            <button type="submit">Enviar inscrição</button>

        </form>

    </section>

</body>

</html>
